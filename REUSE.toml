# REUSE 設定：批次涵蓋無法掛 inline SPDX header 的 manifest / 設定 / 鎖定 / 文件檔。
# 已掛 header 的 .swift 原始碼不在此列；授權全文見 LICENSES/MIT.txt。
version = 1

[[annotations]]
path = [
	".github/dependabot.yml",
	".github/workflows/release.yml",
	".gitignore",
	"Package.resolved",
	"Package.swift",
	"README.md",
	"docs/CODEOWNERS",
	"docs/SECURITY.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Unpxre"
SPDX-License-Identifier = "MIT"
